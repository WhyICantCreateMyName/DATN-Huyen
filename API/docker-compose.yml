name: yuki_fashion
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yuki_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: yuki_fashion
    volumes:
      - yuki_postgres_data:/var/lib/postgresql/data
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: yuki_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  yuki_postgres_data:
    driver: local
  qdrant_data:
    driver: local
